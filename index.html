<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python ITS Certification Reviewer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Python ITS Certification Reviewer</h1>
<p class="subtitle">Practice Exam Simulator</p>

<div class="controls">
<button onclick="toggleDarkMode()">Dark Mode</button>
<button onclick="shuffleQuestions()">Shuffle Questions</button>
<button onclick="restoreOrder()">Original Order</button>
</div>

</header>

<main>

<div class="card">

<div class="progress-container">
<div id="progressBar"></div>
</div>

<div id="questionContainer"></div>

<div class="navButtons">
<button onclick="previousQuestion()">Previous</button>
<button onclick="checkAnswer()">Check Answer</button>
<button onclick="resetQuestion()">Try Again</button>
<button onclick="nextQuestion()">Next</button>
</div>

</div>

</main>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
