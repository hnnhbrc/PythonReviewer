<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python ITS Certification Reviewer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Python ITS Certification Reviewer</h1>
<p class="subtitle">Practice Exam Simulator</p>

<div class="headerButtons">
<button id="darkToggle">Dark Mode</button>
<button onclick="shuffleQuestions()">Shuffle Questions</button>
<button onclick="resetOrder()">Original Order</button>
</div>

</header>

<div class="container">

<div class="progressBar">
<div id="progressFill"></div>
</div>

<h3 id="questionNumber"></h3>

<p id="questionText"></p>

<div id="questionImage"></div>

<pre id="codeBlock"></pre>

<div id="answers"></div>

<div class="navButtons">
<button id="prevBtn">Previous</button>
<button onclick="checkAnswer()">Check Answer</button>
<button onclick="resetQuestion()">Try Again</button>
<button id="nextBtn">Next</button>
</div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>

</html>
